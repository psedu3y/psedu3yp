<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:
    radial-gradient(circle at top,#4f46e5 0%,transparent 35%),
    radial-gradient(circle at bottom,#06b6d4 0%,transparent 35%),
    #0b1120;
}

.card{
    width:100%;
    max-width:380px;
    text-align:center;
    padding:35px 25px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.10);
    backdrop-filter:blur(20px);
    border-radius:30px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.profile{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
    border:4px solid rgba(255,255,255,.15);
    box-shadow:
    0 0 30px rgba(0,198,255,.25),
    0 0 60px rgba(79,70,229,.25);
}

h2{
    color:#fff;
    font-size:30px;
    font-weight:800;
    margin-bottom:25px;
    font-family:'Cinzel',serif;
    letter-spacing:2px;
    text-transform:uppercase;
    text-shadow:
    0 0 10px rgba(255,255,255,.15),
    0 0 20px rgba(0,198,255,.15);
}

.join-btn{
    position:relative;
    display:block;
    width:100%;
    padding:18px;
    border-radius:18px;
    text-decoration:none;
    color:#fff;
    font-size:18px;
    font-weight:700;
    overflow:hidden;
    background:linear-gradient(135deg,#0088cc,#00c6ff);
    box-shadow:
    0 12px 30px rgba(0,136,204,.35),
    0 0 30px rgba(0,198,255,.25);
    transition:.3s;
}

.join-btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.45),
        transparent
    );
    transform:skewX(-25deg);
}

.join-btn:hover{
    transform:translateY(-4px);
    box-shadow:
    0 20px 40px rgba(0,136,204,.45),
    0 0 50px rgba(0,198,255,.35);
}

.join-btn:hover::before{
    left:150%;
    transition:1s;
}

.join-btn:active{
    transform:scale(.98);
}

.footer{
    margin-top:18px;
    color:#94a3b8;
    font-size:12px;
    opacity:.8;
}

</style>

       target="_blank"
       class="join-btn">

    </a>

    <div class="footer">
        Powered by Kabir ADS
    </div>

</div>
